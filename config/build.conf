# Cyrene Clang Build Configuration
# Source this file or pass variables to build.sh

# LLVM branch or tag to build
LLVM_BRANCH="llvmorg-22.1.0"

# Build optimizations
ENABLE_PGO="true"
ENABLE_BOLT="true"
PGO_WORKLOAD="sqlite"

# LTO mode: Thin, Full, or Off
LTO_MODE="Thin"

# Compression level for release tarballs (1-22)
ZSTD_LEVEL="19"

# Install directory
INSTALL_DIR="$HOME/toolchains/cyrene"

# Vendor string in clang version output
CLANG_VENDOR="Cyrene Clang"

# Default target triple
DEFAULT_TARGET_TRIPLE="aarch64-linux-android"
