# Kernel 4.x Configuration
# Use with kernel-build.sh for legacy kernels

# LTO must be OFF for kernel < 5.0
LTO_MODE="off"

# Warning suppress flags (handled by kernel-build.sh)
# 4.x kernels need extensive warning suppression with modern Clang

# Recommended build command:
# bash scripts/kernel-build.sh <kernel-dir> --lto=off
