<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  
  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" fill="#e2e8f0" font-family="system-ui, sans-serif" font-size="18" font-weight="bold">
    Cyrene Clang 22.1.0 Benchmark
  </text>
  
  <!-- Grid lines -->
  <line x1="60" y1="60.0" x2="740" y2="60.0" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="130.0" x2="740" y2="130.0" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="200.0" x2="740" y2="200.0" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="270.0" x2="740" y2="270.0" stroke="#334155" stroke-width="1"/>
  <line x1="60" y1="340.0" x2="740" y2="340.0" stroke="#334155" stroke-width="1"/>
  <g filter="url(#shadow)">
    <rect x="133" y="85.4545454545455" width="80" height="254.5454545454545" fill="#64748b" rx="4"/>
    <text x="173" y="80.4545454545455" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">
      1832ms
    </text>
  </g>
  <text x="173" y="360" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="10">
    no-lto
  </text>
  <g filter="url(#shadow)">
    <rect x="246" y="158.95593489479955" width="80" height="181.04406510520045" fill="#64748b" rx="4"/>
    <text x="286" y="153.95593489479955" text-anchor="middle" fill="#94a3b8" font-family="system-ui, sans-serif" font-size="11">
      1303ms
    </text>
  </g>
  <text x="286" y="360" text-anchor="middle" fill="#cbd5e1" font-family="system-ui, sans-serif" font-size="10">
    thin-lto
  </text>
  <text x="400" y="395" text-anchor="middle" fill="#64748b" font-family="system-ui, sans-serif" font-size="12">
    Compile Time (ms) — Lower is better
  </text>
