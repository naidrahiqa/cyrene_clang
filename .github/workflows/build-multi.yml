name: Build Multiple LLVM Versions

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'LLVM versions to build (comma-separated, e.g. 17.0.6,18.1.8,19.1.0,22.1.8)'
        required: true
        default: '17.0.6,18.1.8,19.1.0,22.1.8'
      enable_pgo:
        description: 'Enable PGO build'
        type: boolean
        default: false
      enable_bolt:
        description: 'Enable BOLT optimization'
        type: boolean
        default: false
      release:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  parse-versions:
    name: Parse versions
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - name: Parse version list
        id: set
        run: |
          VERSIONS="${{ github.event.inputs.versions }}"
          # Convert comma-separated to JSON array
          MATRIX=$(echo "$VERSIONS" | jq -R 'split(",") | map(select(length > 0))')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Versions: $MATRIX"

  build-matrix:
    name: Build LLVM ${{ matrix.llvm_version }}
    needs: parse-versions
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        llvm_version: ${{ fromJson(needs.parse-versions.outputs.matrix) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set version info
        id: version
        run: |
          VERSION="${{ matrix.llvm_version }}"
          echo "llvm_branch=llvmorg-${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building LLVM ${VERSION}"

      - name: Free up disk space
        run: |
          echo "=== Freeing disk space ==="
          sudo rm -rf /usr/share/dotnet /usr/share/swift /opt/ghc \
            /usr/local/share/powershell /usr/local/share/boost \
            /usr/local/lib/android /usr/local/lib/node_modules \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby /opt/hostedtoolcache/Go \
            /opt/hostedtoolcache/Java /opt/hostedtoolcache/PHP \
            /usr/share/miniconda /usr/local/lib/R /usr/local/.ghcup \
            /usr/local/julia* /usr/local/texlive /usr/share/az_* \
            /opt/az /opt/microsoft /opt/mssql /usr/share/kotlinc \
            /usr/local/share/gradle* /usr/local/share/sbt \
            /usr/local/graalvm /usr/local/lib/android \
            /usr/local/share/vcpkg
          sudo apt-get purge -y azure-cli google-cloud-sdk \
            google-cloud-cli google-chrome-stable microsoft-edge-stable \
            firefox mono-devel msbuild libmono-* &>/dev/null || true
          sudo apt-get autoremove -y &>/dev/null || true
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /var/lib/docker
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/* /tmp/* /var/tmp/*
          sudo rm -rf /usr/share/doc /usr/share/man /usr/share/locale /usr/share/info
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3 git curl unzip \
            clang lld ccache \
            libxml2-dev libedit-dev libncurses-dev \
            libc++-dev libc++abi-dev libc6-dev \
            zstd build-essential ca-certificates

      - name: Setup ccache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ matrix.llvm_version }}-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ matrix.llvm_version }}-
            ${{ runner.os }}-ccache-

      - name: Run build
        run: |
          LLVM_BRANCH="${{ steps.version.outputs.llvm_branch }}" \
          ENABLE_PGO="${{ inputs.enable_pgo }}" \
          ENABLE_BOLT="${{ inputs.enable_bolt }}" \
          bash scripts/build.sh

      - name: Package toolchain
        id: package
        run: bash scripts/package.sh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: cyrene-clang-${{ matrix.llvm_version }}
          path: |
            ${{ env.OUTPUT_DIR }}/cyrene-clang-*.tar.zst
            ${{ env.OUTPUT_DIR }}/clang-version.txt
          retention-days: 30

      - name: Publish release
        if: inputs.release == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TARBALL="${{ steps.package.outputs.TARBALL }}"
          VERSION="${{ matrix.llvm_version }}"

          # Delete existing release if exists
          gh release delete "$VERSION" --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          git push --delete origin "$VERSION" 2>/dev/null || true

          gh release create "$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Cyrene Clang $VERSION" \
            --notes "Automated build for LLVM $VERSION" \
            --latest \
            "$TARBALL" \
            "${{ env.OUTPUT_DIR }}/clang-version.txt"
