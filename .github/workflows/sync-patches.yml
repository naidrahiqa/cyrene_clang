name: Sync Stable Patches

on:
  schedule:
    - cron: '0 10 * * 5'  # Every Friday at 10:00 UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Clone LLVM with tags
        run: |
          git clone --filter=blob:none --no-checkout https://github.com/llvm/llvm-project.git llvm-project
          cd llvm-project
          git fetch --tags --depth=1 origin "refs/tags/llvmorg-*:refs/tags/llvmorg-*" 2>/dev/null || true
          git checkout HEAD 2>/dev/null || true

      - name: Run sync-patches
        run: bash scripts/sync-patches.sh
        env:
          LLVM_DIR: ${{ github.workspace }}/llvm-project

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet patches/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: sync LLVM stable patches"
          title: "chore: sync LLVM stable patches"
          body: |
            Auto-synced patches from LLVM stable branch.

            **Generated by:** `sync-patches.yml`
            **Schedule:** Every Friday at 10:00 UTC

            Please review the patch files before merging.
          branch: auto/sync-patches
          delete-branch: true
          labels: patches,automated
