name: Build CyreneClang

on:
  workflow_dispatch:
    inputs:
      llvm_branch:
        description: 'LLVM branch or tag (e.g. llvmorg-22.1.0, main)'
        default: 'llvmorg-22.1.0'
        required: true
      enable_pgo:
        description: 'Enable 2-stage PGO build'
        type: boolean
        default: false
      pgo_workload:
        description: 'PGO workload type (sqlite=fast, kernel=accurate)'
        default: 'sqlite'
      release:
        description: 'Publish to GitHub Releases'
        type: boolean
        default: true

  schedule:
    - cron: '0 0 * * 1'

  push:
    paths:
      - 'patches/**'
      - 'scripts/**'

env:
  LLVM_BRANCH: ${{ github.event.inputs.llvm_branch || 'llvmorg-22.1.0' }}
  ENABLE_PGO: ${{ github.event.inputs.enable_pgo || 'false' }}
  PGO_WORKLOAD: ${{ github.event.inputs.pgo_workload || 'sqlite' }}
  INSTALL_DIR: ${{ github.workspace }}/toolchain
  BUILD_DIR: ${{ github.workspace }}/build
  LLVM_DIR: ${{ github.workspace }}/llvm-project
  OUTPUT_DIR: ${{ github.workspace }}/output
  RELEASE_TAG: cyrene-${{ github.run_number }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  build:
    name: Build CyreneClang
    runs-on: ubuntu-latest

    steps:
      # ── Prep ────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Count patches
        run: echo "PATCH_COUNT=$(ls -1 patches/*.patch 2>/dev/null | wc -l)" >> "$GITHUB_ENV"

      - name: Notify build started
        run: bash scripts/notify.sh started

      - name: Free up disk space
        run: |
          echo "BUILD_STAGE=Freeing disk space" >> "$GITHUB_ENV"
          echo "=== Initial disk usage ==="
          df -h /
          echo "=== Removing runner diagnostic logs ==="
          rm -rf /home/runner/actions-runner/cached/*/_diag/*.log 2>/dev/null || true
          rm -rf /home/runner/actions-runner/_diag/*.log 2>/dev/null || true

          echo "=== Removing large pre-installed packages ==="
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/share/swift \
            /opt/ghc \
            /usr/local/share/powershell \
            /usr/local/share/boost \
            "$AGENT_TOOLSDIRECTORY" \
            /usr/local/lib/android \
            /usr/local/lib/node_modules \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Python \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/Go \
            /opt/hostedtoolcache/Java \
            /opt/hostedtoolcache/PHP \
            /opt/hostedtoolcache/Boost \
            /opt/hostedtoolcache/CMake \
            /opt/hostedtoolcache/Miniconda \
            /opt/hostedtoolcache/PyPy \
            /usr/local/lib/heroku \
            /usr/local/share/chromium \
            /usr/share/miniconda \
            /usr/local/lib/R \
            /usr/local/.ghcup \
            /usr/local/julia* \
            /usr/local/texlive \
            /usr/share/az_* \
            /opt/az \
            /opt/microsoft \
            /opt/mssql \
            /usr/share/kotlinc \
            /usr/local/share/gradle* \
            /usr/local/share/sbt \
            /usr/local/share/powershell \
            /usr/local/graalvm \
            /usr/local/lib/android \
            /usr/local/share/vcpkg

          echo "=== Removing home caches ==="
          rm -rf /home/runner/.cache 2>/dev/null || true
          rm -rf /home/runner/.npm 2>/dev/null || true
          rm -rf /home/runner/.cargo 2>/dev/null || true
          rm -rf /home/runner/.dotnet 2>/dev/null || true
          rm -rf /home/runner/.rustup 2>/dev/null || true
          rm -rf /home/runner/.local/share 2>/dev/null || true
          rm -rf /home/runner/go 2>/dev/null || true

          echo "=== Purging large apt packages ==="
          sudo apt-get purge -y \
            azure-cli \
            google-cloud-sdk \
            google-cloud-cli \
            google-chrome-stable \
            microsoft-edge-stable \
            firefox \
            mono-devel \
            msbuild \
            libmono-* \
            &>/dev/null || true
          sudo apt-get autoremove -y &>/dev/null || true

          echo "=== Removing Docker images ==="
          docker rmi $(docker images -q) 2>/dev/null || true
          sudo rm -rf /var/lib/docker

          echo "=== Removing apt caches ==="
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*

          echo "=== Removing snap packages ==="
          sudo snap list --no-legend 2>/dev/null | awk '{print $1}' | xargs -I{} sudo snap remove --purge {} 2>/dev/null || true

          echo "=== Removing temp files ==="
          sudo rm -rf /tmp/* /var/tmp/*

          echo "=== Removing doc/locale (saves ~1GB) ==="
          sudo rm -rf /usr/share/doc /usr/share/man /usr/share/locale /usr/share/info 2>/dev/null || true
          sudo rm -rf /usr/local/share/doc /usr/local/share/man 2>/dev/null || true

          echo "=== Removing leftover swap/hibernation ==="
          sudo swapoff -a 2>/dev/null || true
          sudo rm -f /swapfile /swap.img 2>/dev/null || true

          echo "=== Removing large logs ==="
          sudo find /var/log -type f -name "*.log" -mtime +1 -exec truncate -s 0 {} \; 2>/dev/null || true
          sudo journalctl --rotate --vacuum-time=1s 2>/dev/null || true

          echo "=== Resize ccache to minimum ==="
          ccache --set-config=max_size=500M 2>/dev/null || true

          echo "=== Final disk usage ==="
          df -h /

      - name: Install build dependencies
        run: |
          echo "BUILD_STAGE=Installing dependencies" >> "$GITHUB_ENV"
          sudo apt-get update
          sudo apt-get install -y \
            cmake ninja-build python3 git curl unzip \
            clang lld ccache \
            libxml2-dev libedit-dev libncurses5-dev \
            libc++-dev libc++abi-dev \
            libc6-dev libgcc-11-dev \
            zstd build-essential ca-certificates \
            binutils-aarch64-linux-gnu

      - name: Setup ccache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ccache
          key: ${{ runner.os }}-ccache-${{ env.LLVM_BRANCH }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-ccache-${{ env.LLVM_BRANCH }}-
            ${{ runner.os }}-ccache-

      - name: Configure ccache
        run: |
          mkdir -p ~/.cache/ccache
          ccache --set-config=max_size=2.0G
          ccache -s

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Make scripts executable
        run: chmod +x scripts/*.sh

      - name: Run build
        run: |
          echo "BUILD_STAGE=Running build" >> "$GITHUB_ENV"
          bash scripts/build.sh
        env:
          JOBS: 4
          LLVM_BRANCH: ${{ env.LLVM_BRANCH }}
          ENABLE_PGO: ${{ env.ENABLE_PGO }}
          PGO_WORKLOAD: ${{ env.PGO_WORKLOAD }}

      - name: Show ccache stats
        run: ccache -s

      # ── Package ──────────────────────────────────────────────────────────────
      - name: Free up space after build
        run: |
          echo "=== Disk usage after build ==="
          df -h /
          echo "=== Cleaning up build artifacts ==="
          rm -rf "$GITHUB_WORKSPACE/build" 2>/dev/null || true
          rm -rf "$GITHUB_WORKSPACE/llvm-project" 2>/dev/null || true
          rm -rf ~/.cache/ccache 2>/dev/null || true
          sudo apt-get clean 2>/dev/null || true
          sudo rm -rf /var/lib/apt/lists/*
          sudo journalctl --rotate --vacuum-time=1s 2>/dev/null || true
          echo "=== Disk usage after cleanup ==="
          df -h /
      - name: Package toolchain + generate manifest
        id: package
        run: |
          echo "BUILD_STAGE=Packaging toolchain" >> "$GITHUB_ENV"
          bash scripts/package.sh
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Show disk usage after build
        run: df -h

      # ── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: cyrene-clang-${{ github.run_number }}
          path: |
            ${{ env.OUTPUT_DIR }}/cyrene-clang-*.tar.zst
            ${{ env.OUTPUT_DIR }}/clang-version.txt
          retention-days: 7

      # ── Release ──────────────────────────────────────────────────────────────
      - name: Set release stage
        if: ${{ github.event.inputs.release == 'true' || github.event_name == 'schedule' }}
        run: echo "BUILD_STAGE=Publishing Release" >> "$GITHUB_ENV"

      - name: Publish GitHub Release
        if: ${{ github.event.inputs.release == 'true' || github.event_name == 'schedule' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "CyreneClang ${{ env.RELEASE_TAG }}"
          body: |
            ## CyreneClang — Automated Build

            **LLVM Branch**: `${{ env.LLVM_BRANCH }}`
            **PGO**: ${{ env.ENABLE_PGO }}
            **LTO**: ThinLTO
            **Targets**: AArch64, ARM, X86

            ### Integration
            ```bash
            wget $(grep DOWNLOAD_URL output/clang-version.txt | cut -d= -f2)
            tar -I zstd -xf cyrene-clang-*.tar.zst -C $HOME/toolchains/
            export PATH="$HOME/toolchains/cyrene/bin:$PATH"
            make CC=clang LD=ld.lld AR=llvm-ar ...
            ```
          files: |
            ${{ steps.package.outputs.TARBALL }}
            ${{ env.OUTPUT_DIR }}/clang-version.txt
          make_latest: true

      # ── Notifications ────────────────────────────────────────────────────────
      # Note: failure notification is handled by build.sh cleanup trap
      # (which has access to build.log and error context)
      - name: Notify build success
        if: success()
        run: bash scripts/notify.sh success
        env:
          CLANG_VERSION: ${{ steps.package.outputs.CLANG_VERSION }}

      - name: Notify release
        if: ${{ (github.event.inputs.release == 'true' || github.event_name == 'schedule') && success() }}
        run: bash scripts/notify.sh release

      - name: Notify build failure
        if: failure()
        run: |
          if [[ "${NOTIFIED_FAILURE:-false}" != "true" ]]; then
            bash scripts/notify.sh failure
          fi
